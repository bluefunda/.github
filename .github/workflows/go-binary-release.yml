name: Go Binary Release

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to build
        required: true
        type: string
      goreleaser-version:
        description: GoReleaser version
        required: false
        type: string
        default: '~> v2'
      goreleaser-args:
        description: GoReleaser arguments
        required: false
        type: string
        default: 'release --clean'
      goreleaser-config:
        description: Path to .goreleaser.yml (defaults to repo root)
        required: false
        type: string
        default: ''
      go-version-file:
        description: Path to go.mod or go.work for version detection
        required: false
        type: string
        default: 'go.mod'
      test-command:
        description: Test command to run before release (empty to skip)
        required: false
        type: string
        default: 'go test -race -count=1 ./...'
    secrets:
      GH_PAT:
        required: true
      HOMEBREW_TAP_TOKEN:
        required: false

env:
  GOPRIVATE: github.com/bluefunda/*

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Configure Git for private modules
        run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Run tests
        if: inputs.test-command != ''
        run: ${{ inputs.test-command }}

      - name: Resolve goreleaser config flag
        id: config
        run: |
          if [ -n "${{ inputs.goreleaser-config }}" ]; then
            echo "flag=--config ${{ inputs.goreleaser-config }}" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: ${{ inputs.goreleaser-version }}
          args: ${{ inputs.goreleaser-args }} ${{ steps.config.outputs.flag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
