name: Docker Deploy

# Reusable workflow: builds a multi-arch Docker image, pushes to GHCR,
# and optionally updates a compose file in the gitops repo so Komodo redeploys.

on:
  workflow_call:
    inputs:
      tag:
        description: Version tag for the Docker image (e.g. v1.2.3)
        required: true
        type: string
      image-name:
        description: Docker image name (defaults to the calling repo name)
        required: false
        type: string
        default: ""
      build-args:
        description: Additional Docker build arguments (one per line)
        required: false
        type: string
        default: ""
      context:
        description: Docker build context path (defaults to repo root)
        required: false
        type: string
        default: "."
      file:
        description: Path to Dockerfile (defaults to Dockerfile in context dir)
        required: false
        type: string
        default: ""
      gitops-repo:
        description: GitOps repo to update (org/repo). Leave empty to skip.
        required: false
        type: string
        default: ""
      gitops-compose-path:
        description: Path to the compose.yaml inside the gitops repo.
        required: false
        type: string
        default: ""
      platforms:
        description: Docker build platforms (e.g. linux/amd64 or linux/amd64,linux/arm64).
        required: false
        type: string
        default: linux/amd64,linux/arm64
      runner:
        description: Runner label. Defaults to ubuntu-latest.
        required: false
        type: string
        default: ubuntu-latest
    secrets:
      GH_PAT:
        description: GitHub PAT — required for private module build args and gitops update.
        required: false

jobs:
  build-and-push:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image name
        id: image
        run: |
          IMAGE_NAME="${{ inputs.image-name }}"
          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME="${GITHUB_REPOSITORY##*/}"
          fi
          echo "name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Resolve Dockerfile path
        id: dockerfile
        run: |
          FILE="${{ inputs.file }}"
          if [ -z "$FILE" ]; then
            FILE="${{ inputs.context }}/Dockerfile"
          fi
          echo "path=$FILE" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ steps.dockerfile.outputs.path }}
          push: true
          platforms: ${{ inputs.platforms }}
          build-args: |
            GH_PAT=${{ secrets.GH_PAT }}
            ${{ inputs.build-args }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ steps.image.outputs.name }}:${{ inputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ steps.image.outputs.name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in gitops repo
        if: inputs.gitops-repo != '' && inputs.gitops-compose-path != ''
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::warning::GH_PAT not set — skipping gitops update"
            exit 0
          fi
          git clone "https://x-access-token:${GH_PAT}@github.com/${{ inputs.gitops-repo }}.git" /tmp/gitops
          cd /tmp/gitops

          IMAGE_NAME="${{ steps.image.outputs.name }}"
          OWNER="${{ github.repository_owner }}"
          COMPOSE="${{ inputs.gitops-compose-path }}"

          sed -i "s|ghcr.io/${OWNER}/${IMAGE_NAME}:.*|ghcr.io/${OWNER}/${IMAGE_NAME}:${{ inputs.tag }}|" "$COMPOSE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$COMPOSE"
          if git diff --staged --quiet; then
            echo "No changes — gitops already up to date"
          else
            git commit -m "chore: update ${IMAGE_NAME} to ${{ inputs.tag }}"
            git push
          fi
