name: TypeScript CI

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '22'
      working-directory:
        description: >
          Working directory for all steps.
          Use for monorepos where package.json is in a subdirectory (e.g. web).
        required: false
        type: string
        default: '.'
      build-command:
        required: false
        type: string
        default: 'npm run build'
      test-command:
        required: false
        type: string
        default: 'npm test'
      typecheck-command:
        required: false
        type: string
        default: 'npm run typecheck'
      lint-command:
        required: false
        type: string
        default: 'npm run lint'
      runner:
        description: Runner label to use (e.g. ubuntu-latest or self-hosted)
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      GH_PAT:
        description: 'GitHub PAT for private package access'
        required: false

jobs:
  typecheck:
    name: Type Check
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: '${{ inputs.working-directory }}/package-lock.json'
      - run: npm ci
      - run: ${{ inputs.typecheck-command }}

  test:
    name: Test
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: '${{ inputs.working-directory }}/package-lock.json'
      - run: npm ci
      - run: ${{ inputs.test-command }}

  build:
    name: Build
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: '${{ inputs.working-directory }}/package-lock.json'
      - run: npm ci
      - run: ${{ inputs.build-command }}

  lint:
    name: Lint
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: '${{ inputs.working-directory }}/package-lock.json'
      - run: npm ci
      - run: ${{ inputs.lint-command }}
